apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kaps-backend-ingress
  namespace: kaps-ai
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  rules:
    - host: kaps.example.com
      http:
        paths:
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: kaps-backend
                port:
                  number: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kaps-frontend-ingress
  namespace: kaps-ai
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: kaps.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kaps-frontend
                port:
                  number: 80
