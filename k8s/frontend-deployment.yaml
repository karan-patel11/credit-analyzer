apiVersion: apps/v1
kind: Deployment
metadata:
  name: kaps-frontend
  namespace: kaps-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kaps-frontend
  template:
    metadata:
      labels:
        app: kaps-frontend
    spec:
      containers:
        - name: kaps-frontend
          image: kaps-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
