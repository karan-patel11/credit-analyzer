apiVersion: apps/v1
kind: Deployment
metadata:
  name: kaps-redis
  namespace: kaps-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kaps-redis
  template:
    metadata:
      labels:
        app: kaps-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          args: ["redis-server", "--appendonly", "yes"]
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 15
