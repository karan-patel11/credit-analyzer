apiVersion: apps/v1
kind: Deployment
metadata:
  name: kaps-backend
  namespace: kaps-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kaps-backend
  template:
    metadata:
      labels:
        app: kaps-backend
    spec:
      containers:
        - name: kaps-backend
          image: kaps-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: kaps-config
            - secretRef:
                name: kaps-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
